<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Label Is Not the Thing — AI Companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 0 auto; padding: 48px 20px; line-height: 1.55; color: #111; background: #faf7f1; }
    h1 { font-size: 2rem; line-height: 1.1; margin-bottom: 0.5rem; }
    p { font-size: 1.05rem; }
    .button-row { display: flex; flex-direction: column; gap: 12px; margin: 28px 0; }
    button { font-size: 1rem; font-weight: 650; padding: 14px 18px; border-radius: 999px; border: 1px solid #111; background: #111; color: #fff; cursor: pointer; }
    button.secondary { background: transparent; color: #111; }
    button:disabled { opacity: 0.45; cursor: wait; }
    #status { margin-top: 16px; font-weight: 650; }
    .note { font-size: 0.95rem; opacity: 0.75; margin-top: 28px; }
    #essayText { display: none; }
  </style>
</head>
<body>
  <h1>The Label Is Not the Thing</h1>
  <p>Copy the essay in one tap, with or without an AI reading guide.</p>
  <div class="button-row">
    <button id="guideButton" onclick="copyEssayWithGuide()" disabled>Loading essay…</button>
    <button id="essayButton" class="secondary" onclick="copyEssayOnly()" disabled>Loading essay…</button>
  </div>
  <div id="status">Loading copy-ready essay…</div>
  <p class="note">Paste it into ChatGPT, Claude, Gemini, or any AI tool to summarize, explain, reflect on, or discuss it.</p>
  <div id="essayText"></div>

  <script>
    const essayTitle = "The Label Is Not the Thing";
    const essayDescription = "how political, religious, and moral labels can become costumes unless they are made real through behavior, conscience, truth, and responsibility.";
    const sourceBlobApi = "https://api.github.com/repos/alexanderschoenherr/earth-drama-ai/git/blobs/73888c90ec27fd582a13b463e01e09b7cf5c2b60";

    let essayReady = false;

    function decodeBase64Utf8(base64) {
      const binary = atob(base64.replace(/\n/g, ""));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder("utf-8").decode(bytes);
    }

    async function loadEssay() {
      try {
        const response = await fetch(sourceBlobApi);
        if (!response.ok) throw new Error("Could not load source essay.");
        const data = await response.json();
        const html = decodeBase64Utf8(data.content);
        const doc = new DOMParser().parseFromString(html, "text/html");
        const essayNode = doc.getElementById("essayText");
        if (!essayNode) throw new Error("Essay text not found.");
        document.getElementById("essayText").innerText = essayNode.innerText.trim();
        essayReady = true;
        document.getElementById("guideButton").disabled = false;
        document.getElementById("essayButton").disabled = false;
        document.getElementById("guideButton").innerText = "Copy Essay + AI Reading Guide";
        document.getElementById("essayButton").innerText = "Copy Essay Only";
        document.getElementById("status").innerText = "Ready to copy.";
      } catch (err) {
        document.getElementById("status").innerText = "Essay failed to load. Refresh the page and try again.";
      }
    }

    function getEssayText() { return document.getElementById("essayText").innerText.trim(); }

    async function copyToClipboard(text, successMessage) {
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById("status").innerText = successMessage;
      } catch (err) {
        document.getElementById("status").innerText = "Copy failed. On iPhone, open this page in Safari/Chrome, then tap and hold to select/copy if needed.";
      }
    }

    function buildGuide(essay) {
      return `I’m going to paste an essay titled "${essayTitle}."

This piece is about ${essayDescription}

Create a concise AI reading guide for someone who has not read the full piece and wants a faster way into its meaning, stakes, and takeaway.

Include:

1. What this piece is about — a short plain-English summary.
2. Why it matters — the human, moral, cultural, spiritual, or political stakes.
3. The core argument — the main claim the piece is making.
4. The central insight, warning, or revelation.
5. Where the reader may recognize themselves in the piece.
6. The takeaway — what the reader should understand, feel, question, or carry with them.
7. 3–5 questions readers can answer in the comments.

Keep the whole response concise, around 400–600 words.

Preserve the author’s voice, framing, urgency, and emotional force.

Do not rewrite the essay, debate it, fact-check it, sanitize it, flatten it into academic commentary, or make it generic.

Do not over-explain every turn of the essay or remove the reason to read the full piece.

The goal is to help the reader understand the piece and decide how they want to engage with it — not replace the piece.

Here is the essay:

${essay}`;
    }

    function copyEssayWithGuide() {
      if (!essayReady) { document.getElementById("status").innerText = "Still loading. Try again in a second."; return; }
      copyToClipboard(buildGuide(getEssayText()), "Copied: essay + AI reading guide.");
    }

    function copyEssayOnly() {
      if (!essayReady) { document.getElementById("status").innerText = "Still loading. Try again in a second."; return; }
      copyToClipboard(getEssayText(), "Copied: essay only.");
    }

    loadEssay();
  </script>
</body>
</html>
