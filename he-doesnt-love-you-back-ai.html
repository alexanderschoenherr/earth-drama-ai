<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>He Doesn’t Love You Back — AI Companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 0 auto; padding: 48px 20px; line-height: 1.55; color: #111; background: #faf7f1; }
    h1 { font-size: 2rem; line-height: 1.1; margin-bottom: 0.5rem; }
    p { font-size: 1.05rem; }
    .button-row { display: flex; flex-direction: column; gap: 12px; margin: 28px 0; }
    button { font-size: 1rem; font-weight: 650; padding: 14px 18px; border-radius: 999px; border: 1px solid #111; background: #111; color: #fff; cursor: pointer; }
    button.secondary { background: transparent; color: #111; }
    #status { margin-top: 16px; font-weight: 650; }
    .note { font-size: 0.95rem; opacity: 0.75; margin-top: 28px; }
    #essayText { display: none; }
  </style>
</head>
<body>
  <h1>He Doesn’t Love You Back</h1>
  <p>Copy the essay in one tap, with or without an AI reading guide.</p>
  <div class="button-row">
    <button onclick="copyEssayWithGuide()">Copy Essay + AI Reading Guide</button>
    <button class="secondary" onclick="copyEssayOnly()">Copy Essay Only</button>
  </div>
  <div id="status"></div>
  <p class="note">Paste it into ChatGPT, Claude, Gemini, or any AI tool to summarize, explain, reflect on, or discuss it.</p>
  <div id="essayText"></div>

  <script>
    const essayTitle = "He Doesn’t Love You Back";
    const sourceUrl = "https://raw.githubusercontent.com/alexanderschoenherr/earth-drama-ai/77ed628865410e8b5df5d844d25cd9a16a9b674a/he-doesnt-love-you-back-ai.html";

    async function getEssayText() {
      const cached = document.getElementById("essayText").innerText.trim();
      if (cached) return cached;
      const response = await fetch(sourceUrl);
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      const essay = doc.getElementById("essayText").innerText.trim();
      document.getElementById("essayText").innerText = essay;
      return essay;
    }

    async function copyToClipboard(text, successMessage) {
      try { await navigator.clipboard.writeText(text); document.getElementById("status").innerText = successMessage; }
      catch (err) { document.getElementById("status").innerText = "Copy failed. Try opening this page in your browser and tapping the button again."; }
    }

    async function copyEssayWithGuide() {
      try {
        const essay = await getEssayText();
        const guide =
`I’m going to paste an essay titled "${essayTitle}."

Create a concise AI reading guide that helps a reader understand the piece without replacing the experience of reading it.

Include:

1. What this piece is really about.
2. The core argument.
3. The central insight, warning, or revelation.
4. Why it matters on a human, moral, cultural, spiritual, or political level.
5. Where the reader may recognize themselves in the piece.
6. The takeaway: what the reader should understand, feel, question, or carry with them.
7. 3–5 questions worth commenting on.

Keep the whole response concise, around 400–600 words.

Preserve the author’s voice, framing, urgency, and emotional force.

Do not rewrite the essay, debate it, fact-check it, sanitize it, flatten it into academic commentary, or make it generic.

The goal is to help the reader enter the piece more deeply — not replace the piece.

Here is the essay:

${essay}`;
        copyToClipboard(guide, "Copied: essay + AI reading guide.");
      } catch (err) {
        document.getElementById("status").innerText = "Copy failed. Try again in a moment.";
      }
    }

    async function copyEssayOnly() {
      try { copyToClipboard(await getEssayText(), "Copied: essay only."); }
      catch (err) { document.getElementById("status").innerText = "Copy failed. Try again in a moment."; }
    }
  </script>
</body>
</html>
