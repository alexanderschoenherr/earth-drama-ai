<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Right Use of the Mind — AI Companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:760px;margin:0 auto;padding:38px 24px 48px;color:#111;background:linear-gradient(180deg,#fcf7ee 0%,#f6ede1 58%,#efe4d2 100%);min-height:100vh;}
    .eyebrow{font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;font-weight:800;opacity:.66;margin-bottom:26px;}
    h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(2.36rem,8.95vw,4.75rem);line-height:1;letter-spacing:-.052em;margin:0 0 18px;font-weight:740;}
    .dek{font-size:1.02rem;line-height:1.36;margin:0 0 24px;color:#252525;font-weight:650;}
    .rule{width:132px;height:2px;background:rgba(92,63,33,.18);margin:0 0 24px;}
    .helper{font-size:1.02rem;line-height:1.45;margin:0 0 24px;color:#3f3f3f;}
    .button-row{display:flex;flex-direction:column;gap:12px;margin:0;}
    button{font-size:1rem;font-weight:750;padding:16px 18px;border-radius:999px;border:1.5px solid #111;background:#111;color:#fff;cursor:pointer;}
    button.secondary{background:rgba(255,255,255,.08);color:#111;}
    #status{margin-top:12px;font-size:.96rem;font-weight:750;color:#111;}
    #essayText{display:none;}
  </style>
</head>
<body>
  <div class="eyebrow">Earth Drama · AI Companion</div>
  <h1>The Right Use of the Mind</h1>
  <p class="dek">We named the world to survive it. Now we have to see beyond the names to become whole.</p>
  <div class="rule"></div>
  <p class="helper">Copy the essay with or without a guided AI prompt, then paste it into ChatGPT, Claude, Gemini, or any AI tool.</p>
  <div class="button-row"><button onclick="copyEssayWithGuide(this)">Copy Essay + Guided AI Prompt</button><button class="secondary" onclick="copyEssayOnly(this)">Copy Essay Only</button></div>
  <div id="status" aria-live="polite"></div><div id="essayText"></div>
  <script>
    const essayTitle = "The Right Use of the Mind";
    const essayDescription = "how the human mind names reality in order to survive, then has to learn not to worship its own names, labels, fears, stories, and identities if it wants to return to truth and wholeness.";
    const sourceUrl=['https://raw.githubusercontent.com','alexanderschoenherr','earth-drama-ai','main','essay-sources','the-right-use-of-the-mind.txt'].join('/');
    async function getEssayText(){const cached=document.getElementById('essayText').innerText.trim();if(cached)return cached;const r=await fetch(sourceUrl);const e=(await r.text()).trim();document.getElementById('essayText').innerText=e;return e;}
    function confirmButton(b){const t=b.innerText;b.innerText='Copied — Paste Into AI';setTimeout(()=>{b.innerText=t;},2200);}
    async function copyText(text,b){try{await navigator.clipboard.writeText(text);document.getElementById('status').innerText='';confirmButton(b);}catch(e){document.getElementById('status').innerText='Copy failed. Try opening this page in your browser and tapping the button again.';}}
    function buildGuide(essay){return [
      `I’m going to paste an essay titled "${essayTitle}."`,
      "",
      `This piece is about ${essayDescription}`,
      "",
      "Respond in the regular chat as plain markdown.",
      "",
      "Create a concise AI reading guide that helps me quickly understand the piece, its argument, its emotional force, and why it matters.",
      "",
      "Use the section headings below in this exact order. Do not number the sections.",
      "",
      "Keep each main section brief and readable on a phone. Most sections should be 2–3 short sentences. Use a fourth sentence only when it adds real clarity or force.",
      "",
      "Write like a sharp, thoughtful reader explaining why the piece matters — not like a book report, abstract, or classroom summary. Favor vivid, precise language that preserves the essay’s tension and force.",
      "",
      "What This Piece Is Really About",
      "Give a short plain-English summary of what the essay is truly about beneath the surface topic.",
      "",
      "The Core Argument",
      "State the main claim the piece is making.",
      "",
      "Why It Matters",
      "Explain the human, moral, cultural, spiritual, or political stakes.",
      "",
      "The Deepest Insight",
      "Name the deeper truth, warning, revelation, or moral pressure the piece is trying to reveal.",
      "",
      "What To Carry Forward",
      "Help me understand what I should question, feel, remember, or keep thinking about after reading.",
      "",
      "Aim for 300–425 words total.",
      "",
      "Do not turn any section into a long paragraph. Prioritize quick orientation over completeness.",
      "",
      "The guide should feel like a sharp map of the essay, not a second essay.",
      "",
      "Preserve the author’s voice, framing, urgency, and emotional force.",
      "",
      "Do not rewrite the essay, debate it, fact-check it, sanitize it, flatten it into academic commentary, or make it generic.",
      "",
      "Do not over-explain every turn of the essay or remove the reason to read the full piece.",
      "",
      "End with a short section titled:",
      "",
      "Ways To Go Deeper",
      "",
      "In that section, include 4 brief, inviting options that help the reader continue the conversation. Keep them specific enough to be useful, but broad enough to fit any Earth Drama piece:",
      "- explore the idea that challenged, moved, or unsettled you most",
      "- think through where you agree, disagree, resist, or feel conflicted",
      "- connect the piece to your own life, relationships, politics, faith, work, or culture",
      "- turn your reaction into a thoughtful comment on the piece",
      "",
      "Then end with this exact final question in bold, without quotation marks:",
      "",
      "**Where do you want to go deeper?**",
      "",
      "Here is the essay:",
      "",
      essay
    ].join('\n');}
    async function copyEssayOnly(b){copyText(await getEssayText(),b);}
    async function copyEssayWithGuide(b){const essay=await getEssayText();copyText(buildGuide(essay),b);}
  </script>
</body>
</html>
